# Agent Conduit — full local stack: gateway + database (+ optional demo agent).
# Usage:
#   docker compose up -d --wait db      # database only (e.g. for running tests)
#   docker compose up --build           # database + gateway (health/readiness server)
#   docker compose --profile demo up    # also start the demo agent

services:
  # Default storage backend.
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: conduit
      POSTGRES_USER: conduit
      POSTGRES_PASSWORD: ${PGPASSWORD:-conduit}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U conduit']
      interval: 5s
      timeout: 5s
      retries: 10

  # The gateway. Today this boots config -> Postgres -> migrations -> a health/readiness server.
  conduit:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGPORT: '5432'
      PGDATABASE: conduit
      PGUSER: conduit
      PGPASSWORD: ${PGPASSWORD:-conduit}
      CONDUIT_PORT: '8443'
      CONDUIT_BASE_URL: http://localhost:8443
      LOG_LEVEL: info
    ports:
      - '8443:8443'
    volumes:
      # Mount config read-only so deployers tune behavior without rebuilding (optional; env wins).
      - ./conduit.config.yaml:/app/conduit.config.yaml:ro
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:8443/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Optional demo agent (only with `--profile demo`).
  demo-agent:
    profiles: [demo]
    build:
      context: .
      dockerfile: Dockerfile
      target: demo-agent
    depends_on:
      - conduit
    environment:
      CONDUIT_BASE_URL: http://conduit:8443

volumes:
  pgdata: {}
