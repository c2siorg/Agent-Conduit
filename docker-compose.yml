# Agent Conduit - full local stack: database + gateway + dashboard (+ optional one-shot demo).
# Usage:
#   docker compose up --build              # db + gateway + dashboard
#   docker compose --profile demo run --rm demo   # register a demo agent end to end
#   open http://localhost:8080             # the dashboard (Active Agent Identities)

services:
  # Default storage backend.
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: conduit
      POSTGRES_USER: conduit
      POSTGRES_PASSWORD: ${PGPASSWORD:-conduit}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U conduit']
      interval: 5s
      timeout: 5s
      retries: 10

  # The gateway. Boots config -> Postgres -> migrations -> discovery/identity/health server.
  conduit:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGPORT: '5432'
      PGDATABASE: conduit
      PGUSER: conduit
      PGPASSWORD: ${PGPASSWORD:-conduit}
      CONDUIT_PORT: '8443'
      CONDUIT_BASE_URL: http://localhost:8443
      # Credential encryption key (base64-encoded 32 bytes). Override in production; never commit a real key.
      # Generate with: openssl rand -base64 32
      CONDUIT_MASTER_KEY: ${CONDUIT_MASTER_KEY:-Y29uZHVpdC1kZXYtbWFzdGVyLWtleS0zMmJ5dGVzISE=}
      LOG_LEVEL: info
    ports:
      - '8443:8443'
    volumes:
      - ./conduit.config.yaml:/app/conduit.config.yaml:ro
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:8443/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # The admin dashboard (static build served by nginx; /api is proxied to the gateway).
  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    depends_on:
      - conduit
    environment:
      CONDUIT_ORIGIN: http://conduit:8443
    ports:
      - '8080:8080'

  # One-shot end-to-end demo: bootstraps a host, registers an agent, hits /agent/status.
  # Run with: docker compose --profile demo run --rm demo
  demo:
    profiles: [demo]
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    depends_on:
      conduit:
        condition: service_healthy
    environment:
      PGHOST: db
      PGPORT: '5432'
      PGDATABASE: conduit
      PGUSER: conduit
      PGPASSWORD: ${PGPASSWORD:-conduit}
      # Connect to the gateway in-network, but sign aud as its advertised issuer.
      CONDUIT_DEMO_URL: http://conduit:8443
      CONDUIT_AUD: http://localhost:8443
    command: ['node', 'apps/server/dist/scripts/demoE2e.js']

  # Long-running self-contained example agent (no external API key): registers itself, then heartbeats -
  # proving its identity to Conduit every ~15s. Revoke it in the dashboard to watch the heartbeat be DENIED.
  # Run with: docker compose --profile example up -d example-agent   (then: docker compose logs -f example-agent)
  example-agent:
    profiles: [example]
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    depends_on:
      conduit:
        condition: service_healthy
    environment:
      PGHOST: db
      PGPORT: '5432'
      PGDATABASE: conduit
      PGUSER: conduit
      PGPASSWORD: ${PGPASSWORD:-conduit}
      CONDUIT_DEMO_URL: http://conduit:8443
      CONDUIT_AUD: http://localhost:8443
      EXAMPLE_HEARTBEAT_MS: '15000'
    command: ['node', 'apps/server/dist/scripts/exampleAgent.js']

volumes:
  pgdata: {}
